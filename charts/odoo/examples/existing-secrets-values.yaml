# Keep the bundled PostgreSQL, but supply both passwords from Secrets.
#
# The database password and the Odoo admin (master) password come from Secrets
# you manage instead of plaintext values. The bundled PostgreSQL is seeded from
# the same database Secret, so the two always agree.
#
#   kubectl create secret generic odoo-db    --from-literal=password=...
#   kubectl create secret generic odoo-admin --from-literal=admin-password=...
#
#   helm install odoo ./charts/odoo -f examples/existing-secrets-values.yaml

database:
  user: odoo
  name: odoo
  existingSecret: odoo-db
  existingSecretKey: password

adminPassword:
  existingSecret: odoo-admin
  existingSecretKey: admin-password

apiVersion: v1
kind: Pod
metadata:
  name: {{ include "odoo.fullname" . }}-test-connection
  labels:
    {{- include "odoo.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: health-check
      image: curlimages/curl:8.11.0
      command:
        - curl
        - --fail
        - --silent
        - --show-error
        - "http://{{ include "odoo.fullname" . }}:{{ .Values.service.httpPort }}/web/health"

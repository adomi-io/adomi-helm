# Default values for the Odoo Helm chart.
# This deploys ghcr.io/adomi-io/odoo, which is configured entirely through
# ODOO_* environment variables (see https://github.com/adomi-io/odoo).
#
# This chart follows the Adomi platform contract: provision ("spin it up") and
# connect ("hook it up") are separate and FULLY explicit — nothing is inferred.
#   - provision: named lists (databases, sso) -> capability CRs (via platform-lib)
#   - connect:   the workload reads ONLY env; you wire connections in .Values.env

replicaCount: 1

image:
  repository: ghcr.io/adomi-io/odoo
  # Defaults to the chart's appVersion (the Odoo major line) when left empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Identity stamped onto the capability CRs this chart emits (the Database
# reconciler requires platform.adomi.io/client). Filled by the controller.
platform:
  client: ""

# --- PROVISION (spin it up) -------------------------------------------------
# Each entry emits a capability CR. The controller fulfils it and delivers
# credentials to the Secret you name here; reference that Secret from .Values.env.
databases: []
  # - name: main
  #   server: acme-prod-db        # DatabaseServer to create it on
  #   databaseName: main          # defaults to name
  #   user: main                  # defaults to name
  #   credentials:
  #     secret: odoo-main-db      # password delivered here (this namespace)
  #     # openbaoPath: secret/acme/odoo/main   # optional explicit OpenBao path
  #     # passwordKey: password

sso: []
  # - name: web
  #   protocol: oauth2            # oauth2 | proxy
  #   redirectUris:
  #     - https://odoo.example.com/oauth-authorized/authentik
  #   credentials:
  #     secret: odoo-oidc         # client-id/client-secret delivered here

# --- CONNECT (hook it up) ---------------------------------------------------
# Explicit env for the workload. The DB connection + admin password live here,
# referencing the Secrets the provision side delivered. Nothing is inferred.
env: []
  # - name: ODOO_DB_HOST
  #   value: main-rw.acme-prod.svc.cluster.local
  # - name: ODOO_DB_PORT
  #   value: "5432"
  # - name: ODOO_DB_USER
  #   value: main
  # - name: ODOO_DB_NAME
  #   value: main
  # - name: ODOO_DB_SSLMODE
  #   value: require
  # - name: ODOO_DB_PASSWORD
  #   valueFrom:
  #     secretKeyRef: { name: odoo-main-db, key: password }
  # - name: ODOO_ADMIN_PASSWD
  #   valueFrom:
  #     secretKeyRef: { name: odoo-admin, key: admin-password }

# Inject env vars in bulk from existing ConfigMaps / Secrets.
extraEnvFrom: []
  # - secretRef:
  #     name: odoo-extra-env

# Odoo application configuration (not connection wiring) -> ODOO_* env.
odoo:
  # Worker processes. 0 = threaded (single-process) mode; >0 enables the
  # prefork multiprocessing server (recommended for production).
  workers: 0
  # Trust X-Forwarded-* headers from the ingress/reverse proxy. Recommended
  # whenever ingress.enabled=true.
  proxyMode: false
  # Allow listing / creating databases from the web UI. Disable in production.
  listDb: true
  logLevel: info
  # Skip loading Odoo demo data on database creation.
  withoutDemo: true
  loadLanguage: ""
  # Comma-separated modules to initialise on startup (ODOO_INIT).
  # `base` is Odoo's minimum schema — a fresh DB is unusable without it, and
  # the image's init hook is idempotent (already-installed modules are skipped),
  # so this is safe on every boot. Add your own modules alongside it.
  initModules: "base"
  # Comma-separated modules to update on startup (ODOO_UPDATE).
  updateModules: ""

# Optionally override the odoo.conf template (mounted at /volumes/config/odoo.conf).
# The image runs envsubst over it at startup, so ${ODOO_*} placeholders work.
odooConf: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

# The image runs as the non-root "ubuntu" user (uid/gid 1000). fsGroup ensures
# the persistent filestore volume is writable by that user.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  # Odoo writes to /volumes and /tmp, so the root filesystem cannot be read-only.
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  httpPort: 8069
  # gevent port used for websockets / live chat / the bus (longpolling).
  longpollingPort: 8072
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: odoo.local
      paths:
        - path: /
          pathType: Prefix
  # When enabled, the listed paths are routed to the gevent (longpolling) port
  # instead of the HTTP port. Required for live chat / websockets behind ingress.
  longpolling:
    enabled: false
    paths:
      - /websocket
      - /longpolling
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Odoo filestore, sessions and outgoing-mail queue live under ODOO_DATA_DIR
# (/volumes/data). Persist it so they survive pod restarts.
persistence:
  enabled: true
  mountPath: /volumes/data
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  existingClaim: ""
  annotations: {}

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

# Health probes hit Odoo's built-in /web/health endpoint.
livenessProbe:
  httpGet:
    path: /web/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 6
readinessProbe:
  httpGet:
    path: /web/health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
# First boot / module initialisation can be slow; the startup probe gives Odoo
# room before liveness/readiness take over.
startupProbe:
  httpGet:
    path: /web/health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

extraVolumes: []
extraVolumeMounts: []

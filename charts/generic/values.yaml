# Default values for the generic web-application chart.
# A generic catalog app: one container, a Service, an optional Ingress, and an
# optional database wired from an existing Secret. New simple apps (uptime-kuma,
# vaultwarden, ...) can run on this chart without bespoke code.

replicaCount: 1

image:
  repository: nginx
  # Defaults to the chart appVersion when left empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Identity stamped onto the capability CRs this chart emits.
platform:
  client: ""

# PROVISION — named lists -> capability CRs (databases, sso). Off by default.
databases: []
sso: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  # Port the container listens on (the Service and Ingress route here).
  port: 80
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: app.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# CONNECT — explicit env for the workload (DB connection, etc., referencing the
# Secrets the provision side delivered). Nothing is inferred.
env: []
# Inject env vars in bulk from existing ConfigMaps / Secrets.
extraEnvFrom: []

livenessProbe: {}
readinessProbe: {}
startupProbe: {}
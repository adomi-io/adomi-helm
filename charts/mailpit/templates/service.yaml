apiVersion: v1
kind: Service
metadata:
  name: {{ include "mailpit.fullname" . }}
  labels:
    {{- include "mailpit.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "mailpit.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.webPort }}
      targetPort: http
      protocol: TCP
    - name: smtp
      port: {{ .Values.service.smtpPort }}
      targetPort: smtp
      protocol: TCP

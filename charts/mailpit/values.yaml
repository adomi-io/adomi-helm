# Default values for the Mailpit Helm chart.
# Mailpit is a developer mail trap: it accepts SMTP on 1025 and serves a web UI on
# 8025. It has no database (messages are kept in memory unless persistence is added).

replicaCount: 1

image:
  repository: axllent/mailpit
  # Defaults to the chart's appVersion when left empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  # Web UI port (the Ingress routes here).
  webPort: 8025
  # SMTP port other apps send mail to.
  smtpPort: 1025
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: mail.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

# Extra raw environment variables (e.g. MP_* settings).
extraEnv: []

livenessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

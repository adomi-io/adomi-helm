apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "superset.fullname" . }}
  labels:
    {{- include "superset.labels" . | nindent 4 }}
data:
  # ---------------------------------------------------------------------------
  # superset_config.py — the workload is a pure consumer: every connection value
  # is read from env (CONNECT side). The chart never infers a host or secret name;
  # you wire them in .Values.env, referencing the Secrets the provision side
  # (.Values.databases / .Values.sso capability CRs) delivered.
  # ---------------------------------------------------------------------------
  superset_config.py: |
    import os

    SECRET_KEY = os.environ["SUPERSET_SECRET_KEY"]

    SQLALCHEMY_DATABASE_URI = (
        "postgresql+psycopg2://"
        f"{os.environ['DATABASE_USER']}:{os.environ['DATABASE_PASSWORD']}"
        f"@{os.environ['DATABASE_HOST']}:{os.environ.get('DATABASE_PORT', '5432')}"
        f"/{os.environ['DATABASE_DB']}"
    )

    # Superset sits behind the platform ingress, which terminates TLS and sets
    # X-Forwarded-*; trust those headers.
    ENABLE_PROXY_FIX = True

    # Optional OAuth (Authentik) — activates only when credentials are wired in
    # via env (the SSOApplication capability delivers client-id/secret to a
    # Secret; reference it from .Values.env). Nothing is inferred.
    _oauth_client_id = os.environ.get("SUPERSET_OAUTH_CLIENT_ID")
    if _oauth_client_id:
        import json
        from flask_appbuilder.security.manager import AUTH_OAUTH
        from superset.security import SupersetSecurityManager

        _provider_name = os.environ.get("SUPERSET_OAUTH_NAME", "authentik")

        AUTH_TYPE = AUTH_OAUTH
        # Auto-create a Superset user on first OIDC login.
        AUTH_USER_REGISTRATION = True
        AUTH_USER_REGISTRATION_ROLE = os.environ.get("SUPERSET_OAUTH_DEFAULT_ROLE", "Public")

        # Map IdP group names -> Superset roles, re-synced on every login. Mirrors
        # "g, <group>, role:admin" RBAC .
        # Requires the `groups` scope so the group claim is returned.
        _role_mapping = json.loads(os.environ.get("SUPERSET_OAUTH_ROLE_MAPPING", "{}"))
        if _role_mapping:
            AUTH_ROLES_MAPPING = _role_mapping
            AUTH_ROLES_SYNC_AT_LOGIN = True

        OAUTH_PROVIDERS = [
            {
                "name": _provider_name,
                "icon": "fa-key",
                "token_key": "access_token",
                "remote_app": {
                    "client_id": _oauth_client_id,
                    "client_secret": os.environ["SUPERSET_OAUTH_CLIENT_SECRET"],
                    "server_metadata_url": os.environ["SUPERSET_OAUTH_METADATA_URL"],
                    "client_kwargs": {
                        "scope": os.environ.get(
                            "SUPERSET_OAUTH_SCOPES", "openid email profile groups"
                        ),
                    },
                },
            }
        ]

        # Flask-AppBuilder has no built-in profile parser for a generic OIDC
        # provider (e.g. Authentik), so map the standard OIDC userinfo claims to
        # a Superset user ourselves — otherwise registration fails after login.
        class _OIDCSecurityManager(SupersetSecurityManager):
            def oauth_user_info(self, provider, response=None):
                if provider != _provider_name:
                    return {}
                remote = self.appbuilder.sm.oauth_remotes[provider]
                # Prefer the id_token claims Authlib already validated; otherwise
                # call the OIDC userinfo endpoint (resolved from discovery).
                data = (response or {}).get("userinfo") or remote.userinfo(token=response)
                return {
                    "username": data.get("preferred_username") or data.get("email") or data.get("sub"),
                    "email": data.get("email", ""),
                    "first_name": data.get("given_name", ""),
                    "last_name": data.get("family_name", ""),
                    "role_keys": data.get("groups", []),
                }

        CUSTOM_SECURITY_MANAGER = _OIDCSecurityManager

  # ---------------------------------------------------------------------------
  # superset_bootstrap.sh — sourced before the server starts. Runs DB migrations
  # (which also doubles as the wait-for-DB loop), initialises roles/permissions,
  # and creates the admin user. All steps are idempotent and safe on every boot.
  # ---------------------------------------------------------------------------
  superset_bootstrap.sh: |
    #!/usr/bin/env bash
    set -eu
    {{- with .Values.superset.extraPipPackages }}

    # The lean apache/superset image ships no database drivers. Install the ones
    # this deployment needs (default: psycopg2-binary for Postgres). The image's
    # venv is root-owned (not writable by the runtime user), so install into the
    # writable /app/pylibs volume, which the container puts on PYTHONPATH. For
    # reproducible/offline deploys, bake these into a custom image instead and
    # set superset.extraPipPackages: [].
    echo "[bootstrap] installing extra python packages: {{ join " " . }}"
    pip install --no-cache-dir --target=/app/pylibs {{ join " " . }}
    {{- end }}

    echo "[bootstrap] applying migrations (retries until the database is reachable)..."
    until superset db upgrade; do
      echo "[bootstrap] database not ready yet; retrying in 5s"
      sleep 5
    done

    echo "[bootstrap] initialising roles and permissions..."
    superset init

    if [ -n "${SUPERSET_ADMIN_USERNAME:-}" ]; then
      echo "[bootstrap] ensuring admin user '${SUPERSET_ADMIN_USERNAME}' exists..."
      superset fab create-admin \
        --username "${SUPERSET_ADMIN_USERNAME}" \
        --firstname "${SUPERSET_ADMIN_FIRSTNAME:-Admin}" \
        --lastname "${SUPERSET_ADMIN_LASTNAME:-User}" \
        --email "${SUPERSET_ADMIN_EMAIL:-admin@example.com}" \
        --password "${SUPERSET_ADMIN_PASSWORD:?SUPERSET_ADMIN_PASSWORD is required when SUPERSET_ADMIN_USERNAME is set}" \
        || true
    fi

    echo "[bootstrap] done."

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "superset.fullname" . }}
  labels:
    {{- include "superset.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "superset.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll the pod when the config / bootstrap script changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "superset.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "superset.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: superset
          image: {{ include "superset.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          # Bootstrap (idempotent migrations/init/admin, also waits for the DB)
          # then exec the upstream gunicorn launcher.
          command:
            - /bin/sh
            - -c
            - . /app/pythonpath/superset_bootstrap.sh; exec /usr/bin/run-server.sh
          ports:
            - name: http
              containerPort: 8088
              protocol: TCP
          # Connection ("hook it up") is fully explicit: DATABASE_*, the admin
          # bootstrap, SUPERSET_SECRET_KEY and any OAuth creds come from .Values.env,
          # referencing the Secrets the provision side delivered. Nothing is inferred.
          env:
            - name: SUPERSET_PORT
              value: "8088"
            - name: SUPERSET_CONFIG_PATH
              value: /app/pythonpath/superset_config.py
            # Runtime-installed DB drivers (see the bootstrap) land here; put it
            # on PYTHONPATH so the root-owned venv can import them. Keep
            # /app/pythonpath for the mounted superset_config.py.
            - name: PYTHONPATH
              value: /app/pylibs:/app/pythonpath

            {{- if .Values.superset.workers }}
            - name: SERVER_WORKER_AMOUNT
              value: {{ .Values.superset.workers | quote }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/pythonpath/superset_config.py
              subPath: superset_config.py
            - name: config
              mountPath: /app/pythonpath/superset_bootstrap.sh
              subPath: superset_bootstrap.sh
            - name: pylibs
              mountPath: /app/pylibs
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "superset.fullname" . }}
        # Writable scratch for runtime-installed python packages (DB drivers).
        - name: pylibs
          emptyDir: {}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
